<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Attempt live exam tests with timer, palette navigation, review flags, and instant scoring.">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#00509d">
  <meta name="author" content="Online Test Platform">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'">
  <link rel="canonical" href="https://sarvesh-kr.github.io/Testable/test.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Online Test Platform - Test Interface">
  <meta property="og:description" content="Live test interface with timer, palette tracking, and instant result computation.">
  <meta property="og:site_name" content="Online Test Platform">
  <meta property="og:url" content="https://sarvesh-kr.github.io/Testable/test.html">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Online Test Platform - Test Interface">
  <meta name="twitter:description" content="Live test interface with timer, palette tracking, and instant result computation.">
  <title>Online Test Platform - Test Interface</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="test">
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <header class="topbar">
    <div class="brand">Online Test Platform</div>
    <div class="row">
      <div id="timer-display" class="timer" aria-live="polite">00:00:00</div>
      <button id="theme-toggle" class="btn ghost" type="button">Toggle Theme</button>
    </div>
  </header>
  <main id="main-content" class="page-wrap test-layout">
    <section class="panel question-panel">
      <div class="row spread">
        <p class="chip" id="test-title">Loading Test...</p>
        <p id="question-index" class="muted">Question 1</p>
      </div>
      <h2 id="question-text"></h2>
      <div id="options-wrap" class="options-wrap"></div>
      <div id="answer-feedback" class="answer-feedback hidden" aria-live="polite"></div>
      <div class="row spread">
        <button id="prev-btn" class="btn ghost" type="button">Previous</button>
        <div class="row">
          <button id="check-answer-btn" class="btn secondary" type="button">Check Answer</button>
          <button id="mark-review-btn" class="btn warning" type="button">Mark for Review</button>
          <button id="save-next-btn" class="btn primary" type="button">Save & Next</button>
        </div>
      </div>
    </section>
    <aside class="panel palette-panel">
      <h3>Question Palette</h3>
      <div class="legend-grid">
        <span><i class="dot answered"></i>Answered</span>
        <span><i class="dot not-answered"></i>Not Answered</span>
        <span><i class="dot review"></i>Review</span>
        <span><i class="dot not-visited"></i>Not Visited</span>
      </div>
      <div id="question-palette" class="palette-grid" aria-label="Question palette"></div>
      <button id="submit-btn" class="btn danger full" type="button">Submit Test</button>
    </aside>
  </main>
  <script type="module" src="js/router.js"></script>
</body>
</html>
